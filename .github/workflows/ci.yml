name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Required at the top level for WIF to exchange tokens with GCP
permissions:
  contents: read
  id-token: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm install
      - name: Build backend
        run: cd backend && npm run build --if-present
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Deploy Backend to Cloud Run'
        run: |
          gcloud run deploy mern-backend \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/mern-backend:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,MONGO_URI=${{ secrets.MONGO_URI }}"

      - name: 'Deploy Frontend to Cloud Run'
        run: |
          gcloud run deploy mern-frontend \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest \
            --region us-central1 \
            --port 8080 \ 
            --allow-unauthenticated

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  notify:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build, deploy]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" || "${{ needs.frontend-tests.result }}" == "failure" || "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "Pipeline successful!"